<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />

  <title>Palm Dragon WebAR</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!--
    Three.js を import map で読み込みます。
    GLTFLoader も three/addons/... 形式で読み込めるようにしています。
    Three.js本体とaddonsは同じバージョンにしてください。
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <main id="app">
    <!-- カメラ映像 -->
    <video
      id="cameraVideo"
      autoplay
      muted
      playsinline
      webkit-playsinline
    ></video>

    <!-- Three.js描画Canvas -->
    <canvas id="threeCanvas"></canvas>

    <!-- デバッグ用ランドマークCanvas -->
    <canvas id="debugCanvas"></canvas>

    <!-- 起動時説明パネル -->
    <section id="startPanel" class="panel start-panel">
      <h1>手のひら龍 WebAR</h1>

      <p>
        スマートフォンのカメラで手のひらを検出し、手のひらの上に龍を表示します。
      </p>

      <ul>
        <li>iPhone Safari / Android Chrome対応</li>
        <li>アプリインストール不要</li>
        <li>手を動かすと龍が追従します</li>
      </ul>

      <button id="startButton" class="main-button">
        開始
      </button>

      <p class="small-note">
        iPhoneでは、必ずこの開始ボタンを押してからカメラを起動します。
      </p>
    </section>

    <!-- ステータス表示 -->
    <div id="statusBar" class="status-bar">
      カメラ準備中
    </div>

    <!-- 右上操作ボタン -->
    <div class="control-buttons">
      <button id="debugToggleButton" class="sub-button">
        デバッグ OFF
      </button>

      <button id="landmarkToggleButton" class="sub-button">
        ランドマーク ON
      </button>

      <button id="tuneToggleButton" class="sub-button">
        調整
      </button>
    </div>

    <!-- 調整UI -->
    <section id="tunePanel" class="panel tune-panel hidden">
      <h2>龍モデル調整</h2>

      <label>
        Scale
        <input id="scaleRange" type="range" min="0.1" max="8" step="0.1" value="1.6" />
        <span id="scaleValue">1.6</span>
      </label>

      <label>
        Offset Y
        <input id="offsetYRange" type="range" min="-2" max="2" step="0.05" value="0.35" />
        <span id="offsetYValue">0.35</span>
      </label>

      <label>
        Rotation Y
        <input id="rotationYRange" type="range" min="-3.14" max="3.14" step="0.05" value="0" />
        <span id="rotationYValue">0</span>
      </label>

      <p class="small-note">
        モデルの大きさ・向きが合わない場合は、まずScaleとRotation Yを調整してください。
      </p>
    </section>

    <!-- エラー表示 -->
    <div id="errorBox" class="error-box hidden"></div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
